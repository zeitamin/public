<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Honeypot Test - Hidden Parent</title>
    <style>
      .level-1 {
        width: 300px; /* Can be set to 0 to test width-based hiding */
        height: 200px;
        background-color: lightblue;
        position: relative; /* Needed for absolute positioning of children */
      }

      .level-2 {
        opacity: 0.99;
        width: 100%;
        height: 100%;
        position: relative;
      }

      .level-3 {
        background-color: red;
        position: absolute;
        left: 80px;
        top: 300px;
        width: 200px;
        height: 200px;
      }
    </style>
  </head>
  <body>
    <h1>Honeypot Test Cases</h1>

    <h2>Hidden Parent with Opacity Stacking Context</h2>
    <div id="indirect" class="level-1">
      <div id="direct" class="level-2">
        <div
          id="honeypot"
          class="level-3"
          onclick="console.log(Math.random())"></div>
      </div>
    </div>
  </body>
</html>
